<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>loops Practice</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <header>
        <h1>Patterns and Tables</h1>
        <p>A small project to practice Loops, nested lopps and loops logic</p>
    </header>
    <main>
       <section class="card">
      <h2>Star Pattern</h2>
      <input type="number" id="starsrow" placeholder="Number of rows" />
      <button onclick="drawnStars()">Draw Pattern</button>
      <pre id="starResult" class="result"></pre>
    </section>
       <section class="card">
       <h1>Table</h1>
       <input type="number" id="table number" placeholder="table of ?"/>
       <button >Generate Table</button>
       <pre id="tableResult" class="result"></pre>
       </section>

       <section class="card">
        <h1>Number Grid (nested loop)</h1>
        <input type="number" id="grid size" placeholder="grid size"/>
        <button>Draw Grid</button>
        <pre id="gridResult" class="result">
            
        </pre>
       </section>
    </main>
    <script src="script.js"></script>
    
    
</body>
</html>
